[platformio]
default_envs = stm32wb55_bringup
src_dir = src
include_dir = include
boards_dir = boards

[env:stm32wb55_bringup]
platform = ststm32@19.6.0
board = weact_wb55cgu6
framework = arduino
monitor_speed = 115200
upload_protocol = stlink
debug_tool = stlink
build_flags =
  -D LORA_ENDPOINT_FW_VERSION=\"0.1.0\"
  -D SERIAL_BAUD=115200
  -D LORA_ENDPOINT_BOARD_WEACT_WB55CGU6
  -D USBCON
  -D USBD_USE_CDC
  -D HAL_PCD_MODULE_ENABLED
  -D USBD_VID=0x0483
  -D USBD_PID=0x5740
[env:stm32wb55_renode]
extends = env:stm32wb55_bringup
build_flags =
  -D LORA_ENDPOINT_FW_VERSION=\"0.1.0\"
  -D SERIAL_BAUD=115200
  -D LORA_ENDPOINT_BOARD_WEACT_WB55CGU6
  -D RENODE_SIMULATION
  -D HAL_UART_MODULE_ENABLED

[env:stm32wb55_hardware_gates]
extends = env:stm32wb55_bringup
build_flags =
  ${env:stm32wb55_bringup.build_flags}
  -D HAL_UART_MODULE_ENABLED
  -D LORA_DISPLAY_HARDWARE_ACTIVE
  -D LORA_DISPLAY_ST7789
  -D LORA_RADIO_HARDWARE_ACTIVE
  -D LORA_RADIO_DX_LR03_SERIAL
  -D LORA_SENSOR_HARDWARE_ACTIVE
  -D LORA_SENSOR_BMP280
  -D LORA_SENSOR_ADXL345
  -D LORA_SENSOR_DHT11
  -D LORA_SENSOR_GPS
  -D LORA_SENSOR_I2C_SCAN

; Library candidates to enable as each hardware slice is wired and tested:
; Adafruit ST7735 and ST7789 Library: display driver
; Adafruit GFX Library: display drawing primitives
; Adafruit BMP280 Library: pressure and temperature
; DHT sensor library: DHT11
; Adafruit ADXL345: accelerometer
; TinyGPSPlus: NMEA parsing from GY-NEO6MV2
